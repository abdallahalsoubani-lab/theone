# Production deploy workflow (Prompt 11 §4.10.3) — Path B (VPS + Docker).
#
# Template only. The clinic owner must populate these secrets in the
# repository's Actions settings before the first successful run:
#
#   DEPLOY_SSH_HOST       — public hostname or IP of the VPS
#   DEPLOY_SSH_USER       — non-root user with sudo + docker access
#   DEPLOY_SSH_KEY        — private key matching an authorized_keys entry
#   DEPLOY_APP_DIR        — absolute path on the VPS, e.g. /opt/theone
#   REGISTRY              — container registry host (e.g. ghcr.io)
#   REGISTRY_USER         — registry username
#   REGISTRY_TOKEN        — registry access token with write scope
#   SMOKE_URL             — base URL the post-deploy smoke test hits
#
# Until those secrets exist the workflow short-circuits at the "guard"
# step so PRs against `main` don't fail the deploy gate just because
# the owner hasn't wired up infrastructure yet.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_HOST }}" ] && [ -n "${{ secrets.REGISTRY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets are not configured yet — skipping. See docs/deploy/vps.md."
          fi

  ci:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build + push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/theone-web:${{ github.sha }}
            ${{ secrets.REGISTRY }}/theone-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull image, run migrations, restart compose
        run: |
          ssh ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} <<'EOSSH'
            set -euo pipefail
            cd ${{ secrets.DEPLOY_APP_DIR }}
            docker compose pull web
            docker compose run --rm web pnpm prisma migrate deploy
            docker compose up -d --no-deps web workers
            docker image prune -f
          EOSSH

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Health-check the deployed URL
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL "${{ secrets.SMOKE_URL }}/api/health" > /dev/null; then
              echo "smoke OK"
              exit 0
            fi
            sleep 10
          done
          echo "smoke failed — production health endpoint never returned 2xx"
          exit 1
