name: i18n sync check

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches: [main]

# Verifies that messages/en.json and messages/ar.json have the same set of
# dotted key paths. Fails the build on divergence so a missing translation
# can never land on main. Backed by scripts/check-i18n-sync.ts.

jobs:
  i18n-sync:
    name: messages/{en,ar}.json key parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run i18n:check
        run: pnpm i18n:check
